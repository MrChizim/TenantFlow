<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C1B18"/>
      <stop offset="100%" style="stop-color:#2A2820"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C4992A"/>
      <stop offset="100%" style="stop-color:#E8C94A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Gold accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#gold)"/>

  <!-- Building icon (simplified) -->
  <g transform="translate(520, 180)" opacity="0.15">
    <rect x="0" y="40" width="160" height="120" fill="none" stroke="#fff" stroke-width="3"/>
    <rect x="20" y="60" width="30" height="30" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="65" y="60" width="30" height="30" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="110" y="60" width="30" height="30" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="20" y="105" width="30" height="55" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="65" y="105" width="30" height="55" fill="none" stroke="#fff" stroke-width="2"/>
    <rect x="110" y="105" width="30" height="55" fill="none" stroke="#fff" stroke-width="2"/>
    <polygon points="80,0 0,40 160,40" fill="none" stroke="#fff" stroke-width="3"/>
  </g>

  <!-- Main title -->
  <text x="600" y="285" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-2">TenantFlow</text>

  <!-- Gold divider -->
  <rect x="540" y="310" width="120" height="3" rx="2" fill="url(#gold)"/>

  <!-- Tagline -->
  <text x="600" y="365" font-family="-apple-system, Arial, sans-serif" font-size="26" font-weight="400" fill="rgba(255,255,255,0.55)" text-anchor="middle" letter-spacing="0.5">Property Management for Nigerian Landlords</text>

  <!-- Pills -->
  <g transform="translate(600, 420)" text-anchor="middle">
    <!-- Pill 1 -->
    <rect x="-270" y="0" width="160" height="36" rx="18" fill="rgba(196,153,42,0.15)" stroke="rgba(196,153,42,0.4)" stroke-width="1"/>
    <text x="-190" y="23" font-family="-apple-system, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Track Tenants</text>
    <!-- Pill 2 -->
    <rect x="-70" y="0" width="140" height="36" rx="18" fill="rgba(196,153,42,0.15)" stroke="rgba(196,153,42,0.4)" stroke-width="1"/>
    <text x="0" y="23" font-family="-apple-system, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Log Payments</text>
    <!-- Pill 3 -->
    <rect x="90" y="0" width="180" height="36" rx="18" fill="rgba(196,153,42,0.15)" stroke="rgba(196,153,42,0.4)" stroke-width="1"/>
    <text x="180" y="23" font-family="-apple-system, Arial, sans-serif" font-size="14" fill="rgba(255,255,255,0.7)" text-anchor="middle">Renewal Reminders</text>
  </g>

  <!-- URL -->
  <text x="600" y="570" font-family="-apple-system, Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.2)" text-anchor="middle" letter-spacing="1">tenantflow.app</text>
</svg>
